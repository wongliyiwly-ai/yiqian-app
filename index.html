    id: i,
    x: Math.random() * 100,
    y: Math.random() * 100,
    size: Math.random() * 3 + 1,
    duration: Math.random() * 20 + 15,
    delay: Math.random() * -20,
  }));

  return (
    <div className="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
      {particles.map(p => (
        <div
          key={p.id}
          className="absolute rounded-full opacity-20"
          style={{
            left: `${p.x}%`,
            top: `${p.y}%`,
            width: p.size,
            height: p.size,
            background: '#8B7355',
            animation: `float-up ${p.duration}s ${p.delay}s infinite linear`,
          }}
        />
      ))}
    </div>
  );
}

// ─── AI Chat ──────────────────────────────────────────────────────────────────
function ChatPage({ lang, t, initialMessage }) {
  const [messages, setMessages] = useState([
    {
      role: 'assistant',
      content: lang === 'zh'
        ? '你好，我是意签 AI。无论你有什么困惑，都可以跟我说。我会用我的方式，陪你思考一下。'
        : 'Hello, I am Yiqian AI. Whatever is on your mind, you can share it with me. I will walk through it with you.'
    }
  ]);
  const [input, setInput] = useState(initialMessage || '');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  useEffect(() => {
    if (initialMessage) {
      setInput(initialMessage);
    }
  }, [initialMessage]);

  const callClaude = useCallback(async (userMessage) => {
    setLoading(true);
    const history = messages.map(m => ({ role: m.role, content: m.content }));
    history.push({ role: 'user', content: userMessage });

    try {
     const response = await fetch("/api/chat", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    lang,
    messages: history
  })
});

const data = await response.json();

if (!response.ok) {
  throw new Error(data.error || "API error");
}

const reply =
  data.reply ||
  (lang === "zh"
    ? "（意签暂时无法回应，请稍后再试。）"
    : "(Yiqian is momentarily unavailable. Please try again.)");

setMessages(prev => [...prev, { role: "assistant", content: reply }]);
    } catch {
      setMessages(prev => [...prev, {
        role: 'assistant',
        content: lang === 'zh' ? '暂时无法连接意签 AI，请稍后再试。' : 'Unable to connect to Yiqian AI right now. Please try again.'
      }]);
    } finally {
      setLoading(false);
    }
  }, [messages, lang]);

  const handleSend = () => {
    const trimmed = input.trim();
    if (!trimmed || loading) return;
    setMessages(prev => [...prev, { role: 'user', content: trimmed }]);
    setInput('');
    callClaude(trimmed);
  };

  return (
    <div className="flex flex-col h-full" style={{ maxHeight: 'calc(100vh - 120px)' }}>
      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4" style={{ minHeight: 0 }}>
        {messages.map((msg, i) => (
          <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
            {msg.role === 'assistant' && (
              <div className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mr-2 mt-1" style={{ background: 'linear-gradient(135deg, #C8A96E, #8B6914)' }}>
                <LotusIcon size={14} />
              </div>
            )}
            <div
              className="max-w-[80%] rounded-2xl px-4 py-3 text-sm leading-relaxed"
              style={{
                background: msg.role === 'user' ? 'linear-gradient(135deg, #8B6914, #6B4A0A)' : 'rgba(255,248,235,0.9)',
                color: msg.role === 'user' ? '#FDF5E0' : '#2C1810',
                fontFamily: "'Noto Serif SC', serif",
                boxShadow: '0 2px 12px rgba(90,60,20,0.1)',
                border: msg.role === 'assistant' ? '1px solid rgba(160,120,60,0.15)' : 'none',
                whiteSpace: 'pre-wrap'
              }}
            >
              {msg.content}
            </div>
          </div>
        ))}
        {loading && (
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: 'linear-gradient(135deg, #C8A96E, #8B6914)' }}>
              <LotusIcon size={14} />
            </div>
            <div className="rounded-2xl px-4 py-3" style={{ background: 'rgba(255,248,235,0.9)', border: '1px solid rgba(160,120,60,0.15)' }}>
              <div className="flex gap-1">
                {[0, 1, 2].map(i => (
                  <div key={i} className="w-2 h-2 rounded-full animate-bounce" style={{ background: '#C8A96E', animationDelay: `${i * 0.15}s` }} />
                ))}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Suggested questions */}
      {messages.length <= 1 && (
        <div className="px-4 pb-2 flex flex-wrap gap-2">
          {t.suggestedQuestions.map((q, i) => (
            <button
              key={i}
              onClick={() => { setInput(q); inputRef.current?.focus(); }}
              className="text-xs px-3 py-1.5 rounded-full transition-all duration-150 hover:opacity-80"
              style={{ background: 'rgba(160,120,60,0.12)', color: '#6B4A1A', border: '1px solid rgba(160,120,60,0.2)', fontFamily: "'Noto Serif SC', serif" }}
            >
              {q}
            </button>
          ))}
        </div>
      )}

      {/* Input */}
      <div className="px-4 pb-4 pt-2">
        <div className="flex gap-2 rounded-2xl p-2" style={{ background: 'rgba(255,248,235,0.9)', border: '1px solid rgba(160,120,60,0.2)', boxShadow: '0 4px 20px rgba(90,60,20,0.08)' }}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
            placeholder={t.chatPlaceholder}
            rows={1}
            className="flex-1 bg-transparent resize-none outline-none text-sm px-2 py-1"
            style={{ color: '#2C1810', fontFamily: "'Noto Serif SC', serif", maxHeight: 80 }}
          />
          <button
            onClick={handleSend}
            disabled={!input.trim() || loading}
            className="px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 disabled:opacity-40"
            style={{ background: 'linear-gradient(135deg, #8B6914, #6B4A0A)', color: '#FDF5E0', fontFamily: "'Noto Serif SC', serif" }}
          >
            {t.send}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState('zh');
  const [page, setPage] = useState('home');
  const [isShaking, setIsShaking] = useState(false);
  const [currentLot, setCurrentLot] = useState(null);
  const [chatInitialMessage, setChatInitialMessage] = useState('');
  const t = T[lang];

  const handleDraw = () => {
    if (isShaking) return;
    setIsShaking(true);
    setTimeout(() => {
      const lot = LOTS[Math.floor(Math.random() * LOTS.length)];
      setCurrentLot(lot);
      setIsShaking(false);
      setPage('result');
    }, 1800);
  };

  const handleAskAI = () => {
    if (currentLot) {
      const msg = lang === 'zh'
        ? `我刚抽到了「${currentLot.name}」这支签（${currentLot.number}），签文是：${currentLot.verse}\n\n请帮我解读这支签对我的意义。`
        : `I just drew the lot "${currentLot.nameEn}". The verse is: "${currentLot.verseEn}". Could you help me understand what this means for me?`;
      setChatInitialMessage(msg);
      setPage('chat');
    }
  };

  const navItems = [
    { key: 'home', label: t.home },
    { key: 'draw', label: t.draw },
    { key: 'chat', label: t.chat },
    { key: 'about', label: t.about },
  ];

  return (
    <div className="min-h-screen" style={{
      background: 'linear-gradient(160deg, #FBF5E8 0%, #F0E6CC 40%, #E8D9B8 100%)',
      fontFamily: "'Noto Serif SC', serif"
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&display=swap');

        @keyframes float-up {
          from { transform: translateY(0) rotate(0deg); opacity: 0.2; }
          50% { opacity: 0.15; }
          to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        @keyframes shake {
          0%, 100% { transform: rotate(0deg); }
          10% { transform: rotate(-8deg) translateX(-3px); }
          20% { transform: rotate(10deg) translateX(3px); }
          30% { transform: rotate(-10deg) translateX(-3px); }
          40% { transform: rotate(12deg) translateX(3px); }
          50% { transform: rotate(-8deg) translateX(-2px); }
          60% { transform: rotate(8deg) translateX(2px); }
          70% { transform: rotate(-5deg) translateX(-1px); }
          80% { transform: rotate(5deg) translateX(1px); }
          90% { transform: rotate(-2deg); }
        }

        @keyframes fade-in-up {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }

        @keyframes ink-spread {
          from { opacity: 0; transform: scale(0.8); }
          to { opacity: 0.06; transform: scale(1); }
        }

        .animate-shake { animation: shake 0.5s ease-in-out infinite; }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }
        .ink-bg { animation: ink-spread 1.5s ease-out forwards; }
      `}</style>

      <FloatingParticles />

      {/* Ink wash background decoration */}
      <div className="fixed pointer-events-none" style={{ top: '10%', right: '-5%', width: '40vw', height: '40vw', opacity: 0 }} aria-hidden="true">
        <InkBlob className="w-full h-full ink-bg text-amber-900" />
      </div>
      <div className="fixed pointer-events-none" style={{ bottom: '5%', left: '-10%', width: '35vw', height: '35vw', opacity: 0, animationDelay: '0.5s' }} aria-hidden="true">
        <InkBlob className="w-full h-full ink-bg text-amber-800" />
      </div>

      {/* Header */}
      <header className="sticky top-0 z-50 backdrop-blur-md" style={{ background: 'rgba(251,245,232,0.85)', borderBottom: '1px solid rgba(160,120,60,0.12)' }}>
        <div className="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
          <button onClick={() => setPage('home')} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <div className="w-7 h-7 rounded-full flex items-center justify-center" style={{ background: 'linear-gradient(135deg, #C8A96E, #8B6914)' }}>
              <LotusIcon size={14} />
            </div>
            <span className="text-lg font-semibold tracking-wide" style={{ color: '#2C1810' }}>{t.appName}</span>
          </button>
          <div className="flex items-center gap-1">
            {navItems.map(item => (
              <button
                key={item.key}
                onClick={() => { setPage(item.key); if (item.key === 'draw') setCurrentLot(null); }}
                className="px-3 py-1.5 rounded-lg text-xs transition-all duration-150"
                style={{
                  color: page === item.key || (item.key === 'draw' && page === 'result') ? '#6B4A1A' : '#8B7355',
                  background: page === item.key || (item.key === 'draw' && page === 'result') ? 'rgba(160,120,60,0.12)' : 'transparent',
                  fontFamily: "'Noto Serif SC', serif"
                }}
              >
                {item.label}
              </button>
            ))}
            <button
              onClick={() => setLang(l => l === 'zh' ? 'en' : 'zh')}
              className="ml-2 px-3 py-1.5 rounded-lg text-xs transition-all duration-150 hover:opacity-80"
              style={{ background: 'rgba(160,120,60,0.15)', color: '#6B4A1A', border: '1px solid rgba(160,120,60,0.2)' }}
            >
              {lang === 'zh' ? 'EN' : '中'}
            </button>
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main className="max-w-2xl mx-auto px-4 py-8">

        {/* HOME */}
        {page === 'home' && (
          <div className="animate-fade-in-up text-center">
            <div className="mb-8 relative inline-block">
              <div className="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4" style={{ background: 'linear-gradient(135deg, #C8A96E 0%, #8B6914 100%)', boxShadow: '0 8px 32px rgba(139,105,20,0.3)' }}>
                <LotusIcon size={36} />
              </div>
              <h1 className="text-5xl font-semibold mb-2" style={{ color: '#2C1810', letterSpacing: '0.15em' }}>
                {t.appName}
              </h1>
              <p className="text-base tracking-[0.25em] opacity-60 mb-1" style={{ color: '#5C4A2A' }}>
                {t.tagline}
              </p>
              {lang === 'en' && (
                <p className="text-xs tracking-widest opacity-40" style={{ color: '#5C4A2A' }}>YIQIAN · 意签</p>
              )}
            </div>

            <div className="relative my-10">
              <div className="absolute inset-0 flex items-center">
                <div className="w-full h-px" style={{ background: 'linear-gradient(90deg, transparent, rgba(139,105,20,0.3), transparent)' }} />
              </div>
              <div className="relative flex justify-center">
                <span className="px-4 text-xs opacity-40" style={{ background: 'transparent', color: '#5C4A2A' }}>✦</span>
              </div>
            </div>

            <p className="text-base leading-relaxed mx-auto mb-12 max-w-sm opacity-75" style={{ color: '#3C2A15' }}>
              {t.intro}
            </p>

            <div className="flex flex-col gap-3 max-w-xs mx-auto">
              <button
                onClick={() => { setPage('draw'); setCurrentLot(null); }}
                className="py-4 rounded-2xl text-base font-medium tracking-wider transition-all duration-200 hover:scale-[1.02] hover:shadow-lg"
                style={{
                  background: 'linear-gradient(135deg, #A08040 0%, #6B4A0A 100%)',
                  color: '#FDF5E0',
                  boxShadow: '0 8px 24px rgba(107,74,10,0.25)'
                }}
              >
                {t.startDraw}
              </button>
              <button
                onClick={() => { setChatInitialMessage(''); setPage('chat'); }}
                className="py-4 rounded-2xl text-base tracking-wider transition-all duration-200 hover:opacity-80"
                style={{
                  background: 'transparent',
                  color: '#8B6914',
                  border: '1.5px solid rgba(139,105,20,0.35)'
                }}
              >
                {t.chatWithAI}
              </button>
            </div>

            {/* Theme decoration */}
            <div className="mt-16 flex justify-center gap-6 opacity-20">
              {['○', '◇', '△', '◇', '○'].map((s, i) => (
                <span key={i} className="text-sm" style={{ color: '#8B6914' }}>{s}</span>
              ))}
            </div>

            {/* Disclaimer */}
            <p className="mt-12 text-xs leading-relaxed opacity-30 max-w-sm mx-auto" style={{ color: '#5C4A2A' }}>
              {t.disclaimer}
            </p>
          </div>
        )}

        {/* DRAW */}
        {page === 'draw' && !currentLot && (
          <div className="animate-fade-in-up text-center">
            <h2 className="text-2xl font-semibold mb-2 tracking-wide" style={{ color: '#2C1810' }}>{t.drawTitle}</h2>
            <p className="text-sm opacity-50 mb-12" style={{ color: '#5C4A2A' }}>{t.drawSub}</p>
            <div className="py-8">
              <LotContainer onDraw={handleDraw} isShaking={isShaking} lang={lang} t={t} />
            </div>
          </div>
        )}

        {/* RESULT */}
        {page === 'result' && currentLot && (
          <div className="animate-fade-in-up">
            <p className="text-center text-sm tracking-widest mb-6 opacity-40" style={{ color: '#5C4A2A' }}>{t.lotResultTitle}</p>
            <ResultCard lot={currentLot} lang={lang} t={t} onAskAI={handleAskAI} onRedraw={() => { setCurrentLot(null); setPage('draw'); }} />
          </div>
        )}

        {/* CHAT */}
        {page === 'chat' && (
          <div className="animate-fade-in-up">
            <div className="text-center mb-6">
              <h2 className="text-2xl font-semibold mb-1" style={{ color: '#2C1810' }}>{t.chatTitle}</h2>
              <p className="text-sm opacity-50" style={{ color: '#5C4A2A' }}>{t.chatSub}</p>
            </div>
            <ChatPage lang={lang} t={t} initialMessage={chatInitialMessage} key={chatInitialMessage} />
          </div>
        )}

        {/* ABOUT */}
        {page === 'about' && (
          <div className="animate-fade-in-up max-w-md mx-auto">
            <div className="text-center mb-8">
              <div className="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style={{ background: 'linear-gradient(135deg, #C8A96E, #8B6914)', boxShadow: '0 8px 24px rgba(139,105,20,0.25)' }}>
                <LotusIcon size={28} />
              </div>
              <h2 className="text-2xl font-semibold tracking-widest" style={{ color: '#2C1810' }}>{t.aboutTitle}</h2>
            </div>

            <div className="rounded-2xl p-6 mb-6" style={{ background: 'rgba(255,248,235,0.7)', border: '1px solid rgba(160,120,60,0.15)', boxShadow: '0 8px 32px rgba(90,60,20,0.08)' }}>
              <p className="text-sm leading-loose whitespace-pre-line" style={{ color: '#3C2A15' }}>
                {t.aboutText}
              </p>
            </div>

            <div className="rounded-2xl p-5" style={{ background: 'rgba(160,120,60,0.08)', border: '1px solid rgba(160,120,60,0.15)' }}>
              <p className="text-xs leading-relaxed opacity-60" style={{ color: '#5C4A2A' }}>
                {t.disclaimer}
              </p>
            </div>

            {/* Lots count */}
            <div className="mt-8 text-center">
              <p className="text-xs opacity-30 tracking-widest" style={{ color: '#5C4A2A' }}>
                {lang === 'zh' ? `收录签文 ${LOTS.length} 支` : `${LOTS.length} Original Lots`}
              </p>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
